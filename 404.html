<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,follow" />
    <title>404 | Page introuvable</title>
    <style>
        :root {
            --bg: #0b1220;
            --bg2: #141d31;
            --text: #eef2ff;
            --muted: #b8c0d9;
            --primary: #22c55e;
            --primary-2: #16a34a;
            --line: #2d3a59;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            font-family: "Noto Sans", system-ui, -apple-system, sans-serif;
            color: var(--text);
            background:
                radial-gradient(900px 400px at 10% -10%, #1f2c4d 0%, transparent 60%),
                linear-gradient(160deg, var(--bg), var(--bg2));
            padding: 24px;
        }

        .card {
            width: min(720px, 100%);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 36px 28px;
            background: rgba(8, 13, 25, .65);
            backdrop-filter: blur(4px);
        }

        .code {
            font-size: 72px;
            line-height: 1;
            margin: 0 0 10px
        }

        h1 {
            margin: 0 0 10px;
            font-size: 32px
        }

        p {
            margin: 0 0 22px;
            color: var(--muted)
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap
        }

        .btn {
            text-decoration: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 700;
            border: 1px solid var(--line);
            color: var(--text);
        }

        .btn.primary {
            background: var(--primary);
            color: #06210f;
            border-color: transparent
        }

        .btn.primary:hover {
            background: var(--primary-2)
        }
    </style>
</head>

<body>
    <main class="card">
        <p class="code">404</p>
        <h1>Page introuvable</h1>
        <p>Le lien est peut-être cassé ou la page a été déplacée.</p>
        <div class="actions">
            <a class="btn primary" href="/index.html">Retour à l’accueil</a>
            <a class="btn" href="/pages/portfolio.html">Voir mes projets</a>
            <a class="btn" href="/pages/contact.html">Me contacter</a>
        </div>
    </main>
</body>

</html>
