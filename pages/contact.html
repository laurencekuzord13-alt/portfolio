<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Portfolio</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <section class="section surface" style="margin-top: 24px;">
    <h1 class="section-title">Contact</h1>
    <form class="contact-form" action="https://formsubmit.co/laurencekuzord13@gmail.com" method="POST" data-next-path="message-envoye.html">
      <input type="hidden" name="_subject" value="Nouveau message depuis la page contact" />
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_template" value="table" />
      <input type="hidden" name="_next" value="https://formsubmit.co/thanks" />
      <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />
      <input type="text" name="name" required autocomplete="name" placeholder="Nom complet" />
      <input type="email" name="email" required autocomplete="email" placeholder="Email" />
      <textarea name="message" rows="5" required placeholder="Votre message"></textarea>
      <button type="submit">Envoyer</button>
    </form>
    <p class="section-text" style="margin-top: 10px;">Email: laurencekuzord13@gmail.com</p>
    <p class="section-text"><a href="../index.html">Retour à l'accueil</a></p>
  </section>
  <script src="../assets/js/app.js"></script>
</body>
</html>
